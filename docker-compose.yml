services:
  monkeytype-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: monkeytype-fetcher
    restart: unless-stopped
    environment:
      - MONKEYTYPE_APE_KEY=${MONKEYTYPE_APE_KEY}
      - UPDATES_PER_DAY=${UPDATES_PER_DAY}
    volumes:
      # On lie ton dossier SSD au dossier /app/data du container
      - /opt/docker/monkeytype:/app/data

  monkeytype-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: monkeytype-ui
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      - MONKEYTYPE_APE_KEY=${MONKEYTYPE_APE_KEY}
    volumes:
      # On partage le même dossier pour que le frontend lise le JSON
      - /opt/docker/monkeytype:/app/data
    depends_on:
      - monkeytype-backend
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
